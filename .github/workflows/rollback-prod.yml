# rollback-prod
#
# Implements docs/superpowers/specs/2026-05-16-promote-to-prod-design.md §4.
# Rolls back a wave to a previously prod-tagged SHA. Requires paste-back
# confirmation and N=2 prod-deployers approval. Tenant data restore is
# opt-in. Both platforms must succeed (parity gate); a Railway-only or
# Fly-only rollback aborts.

name: rollback-prod

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: 'SHA to roll back TO (must be a prior prod tag)'
        required: true
      wave:
        description: 'Wave to roll back'
        required: true
        type: choice
        options: [canary, w1, w2, all]
      platforms:
        default: 'railway,fly'
      restore_data:
        description: 'Restore tenant data to pre-promotion snapshot? (destructive only)'
        default: 'false'
        type: choice
        options: ['true', 'false']
      paste_back:
        description: 'Type "ROLLBACK <wave>" to confirm (must match exactly)'
        required: true
      dry_run:
        description: 'Dry-run mode (used by weekly rehearsal cron)'
        default: 'false'
        type: choice
        options: ['true', 'false']

concurrency:
  group: rollback-prod-${{ inputs.wave }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write       # tag-rollback retags GHCR images
  id-token: write       # cosign verify uses GitHub OIDC

jobs:

  preflight:
    name: Verify rollback request
    runs-on: ubuntu-latest
    outputs:
      target_tenants: ${{ steps.tenants.outputs.target_tenants }}
      destructive_tenants: ${{ steps.impact.outputs.destructive_tenants }}
    steps:
      - name: Verify paste-back
        env:
          PG_DSN: ${{ secrets.CONTROL_PLANE_PG_DSN }}
          WAVE: ${{ inputs.wave }}
          PASTE: ${{ inputs.paste_back }}
        run: |
          expected="ROLLBACK $WAVE"
          if [ "$PASTE" != "$expected" ]; then
              echo "::error::Paste-back text did not match. Expected exactly: '$expected'" >&2
              # Forensic row before aborting — spec §11.
              if [ -n "${PG_DSN:-}" ]; then
                  psql "$PG_DSN" -c "
                    INSERT INTO saas_audit.event
                      (actor_kind, actor_name, action, target_kind, target_id, sha, wave, reason, payload)
                    VALUES
                      ('human', '${{ github.actor }}', 'rollback-prod', 'wave', '$WAVE',
                       '${{ inputs.target_sha }}', '$WAVE', 'paste_back_mismatch',
                       jsonb_build_object('outcome', 'security_alert', 'provided', '$PASTE'))
                  " || true
              fi
              exit 1
          fi
          echo "::notice::paste-back accepted"

      - uses: actions/checkout@v4

      - name: Verify target SHA was previously a prod tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ inputs.target_sha }}
        run: |
          set -euo pipefail
          tags=$(gh api "repos/${{ github.repository }}/tags" --paginate \
              | jq -r ".[] | select(.commit.sha == \"$SHA\") | .name")
          if ! echo "$tags" | grep -q "^prod-"; then
              echo "::error::SHA $SHA was never deployed to prod (no prod-* tag)." >&2
              exit 1
          fi

      - name: List target tenants from wave
        id: tenants
        env:
          PG_DSN: ${{ secrets.CONTROL_PLANE_PG_DSN }}
        run: |
          tenants=$(psql "$PG_DSN" -t -A -c "
            SELECT json_agg(slug)
            FROM tenants
            WHERE wave = '${{ inputs.wave }}' AND state = 'active'
          " || echo "[]")
          if [ -z "$tenants" ] || [ "$tenants" = "null" ]; then
              tenants="[]"
          fi
          echo "target_tenants=$tenants" >> "$GITHUB_OUTPUT"
          echo "::notice::Target tenants: $tenants"

      - name: Compute data-restore impact (destructive forward migrations)
        id: impact
        env:
          PG_DSN: ${{ secrets.CONTROL_PLANE_PG_DSN }}
          TARGET_SHA: ${{ inputs.target_sha }}
        run: |
          set -euo pipefail
          # Per tenant in the wave: any tenant_migration_jobs row applied
          # between target_sha and the tenant's current last_migrated_sha
          # whose `destructive` flag is true means a plain code revert
          # will leave the schema ahead of the code — restore_data=true
          # is required for that tenant.
          dest=$(psql "$PG_DSN" -t -A -c "
            SELECT coalesce(json_agg(t.slug), '[]'::json)
            FROM tenants t
            JOIN tenant_migration_jobs j ON j.tenant_id = t.id
            WHERE t.wave = '${{ inputs.wave }}'
              AND t.state = 'active'
              AND j.applied_at > (
                  SELECT max(applied_at) FROM tenant_migration_jobs
                  WHERE tenant_id = t.id AND target_sha = '$TARGET_SHA'
              )
              AND j.destructive = TRUE
          " 2>/dev/null || echo "[]")
          if [ -z "$dest" ] || [ "$dest" = "null" ]; then
              dest="[]"
          fi
          echo "destructive_tenants=$dest" >> "$GITHUB_OUTPUT"
          count=$(echo "$dest" | jq -r '. | length // 0')
          {
            echo "## Rollback preflight"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Target SHA | \`${{ inputs.target_sha }}\` |"
            echo "| Wave | \`${{ inputs.wave }}\` |"
            echo "| Platforms | \`${{ inputs.platforms }}\` |"
            echo "| restore_data | \`${{ inputs.restore_data }}\` |"
            echo "| Tenants with destructive-forward migrations | **${count}** |"
            echo "| Actor | @${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$count" != "0" ] && [ "${{ inputs.restore_data }}" != "true" ]; then
              echo "::warning::${count} tenant(s) have destructive forward migrations. restore_data=false will leave them in schema-drift state."
              echo "- ⚠️ \`restore_data=false\` selected but destructive migrations present" >> "$GITHUB_STEP_SUMMARY"
          fi

  resolve-digest:
    name: Resolve GHCR digests + cosign verify (rollback target)
    needs: [preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      odoo_digest: ${{ steps.resolve.outputs.odoo_digest }}
      postgres_digest: ${{ steps.resolve.outputs.postgres_digest }}
      backup_runner_digest: ${{ steps.resolve.outputs.backup_runner_digest }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve digests
        id: resolve
        env:
          SHA: ${{ inputs.target_sha }}
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          short="${SHA:0:7}"
          failed=0
          for img in odoo-saas-odoo odoo-saas-postgres odoo-saas-backup-runner; do
              ref="ghcr.io/${owner}/${img}:sha-${short}"
              digest=$(docker buildx imagetools inspect "$ref" --format '{{.Manifest.Digest}}' 2>/dev/null || true)
              if [ -z "$digest" ]; then
                  echo "::error::Rollback target image missing: $ref. Cannot pin rollback to a phantom digest." >&2
                  failed=1
                  continue
              fi
              key=$(echo "$img" | sed 's/^odoo-saas-//; s/-/_/g')
              echo "${key}_digest=${digest}" >> "$GITHUB_OUTPUT"
          done
          [ "$failed" = "0" ] || exit 1
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Verify cosign signatures
        env:
          ODOO_DIGEST: ${{ steps.resolve.outputs.odoo_digest }}
          POSTGRES_DIGEST: ${{ steps.resolve.outputs.postgres_digest }}
          BACKUP_RUNNER_DIGEST: ${{ steps.resolve.outputs.backup_runner_digest }}
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          for pair in "odoo-saas-odoo=$ODOO_DIGEST" \
                      "odoo-saas-postgres=$POSTGRES_DIGEST" \
                      "odoo-saas-backup-runner=$BACKUP_RUNNER_DIGEST"; do
              name="${pair%%=*}"; digest="${pair##*=}"
              ref="ghcr.io/${owner}/${name}@${digest}"
              cosign verify \
                  --certificate-oidc-issuer https://token.actions.githubusercontent.com \
                  --certificate-identity-regexp "https://github.com/${GITHUB_REPOSITORY}/" \
                  "$ref"
              # Tier 7: SLSA provenance attestation must also verify.
              cosign verify-attestation \
                  --type slsaprovenance \
                  --certificate-oidc-issuer https://token.actions.githubusercontent.com \
                  --certificate-identity-regexp "https://github.com/${GITHUB_REPOSITORY}/" \
                  "$ref" >/dev/null
          done

  approval:
    name: Awaiting prod-deployers approval (N=2)
    needs: [preflight, resolve-digest]
    if: inputs.dry_run == 'false'
    runs-on: ubuntu-latest
    environment: prod-rollback   # configure N=2 in repo settings
    steps:
      - run: echo "Rollback approved by 2 prod-deployers"

  tag-rollback:
    name: Tag rollback image
    needs: [approval, resolve-digest]
    if: |
      always()
      && needs.resolve-digest.result == 'success'
      && (needs.approval.result == 'success' || needs.approval.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      rollback_tag: ${{ steps.compute.outputs.rollback_tag }}
    steps:
      - name: Compute rollback tag
        id: compute
        run: |
          tag="rollback-prod-$(date -u +%Y.%m.%d)-${{ github.run_number }}"
          echo "rollback_tag=$tag" >> "$GITHUB_OUTPUT"
          {
            echo "## Rollback tag"
            echo "- Tag: \`$tag\`"
            echo "- Target SHA: \`${{ inputs.target_sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Log in to GHCR
        if: inputs.dry_run == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Retag by digest
        if: inputs.dry_run == 'false'
        env:
          ROLLBACK_TAG: ${{ steps.compute.outputs.rollback_tag }}
          ODOO_DIGEST: ${{ needs.resolve-digest.outputs.odoo_digest }}
          POSTGRES_DIGEST: ${{ needs.resolve-digest.outputs.postgres_digest }}
          BACKUP_RUNNER_DIGEST: ${{ needs.resolve-digest.outputs.backup_runner_digest }}
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          for pair in "odoo-saas-odoo=$ODOO_DIGEST" \
                      "odoo-saas-postgres=$POSTGRES_DIGEST" \
                      "odoo-saas-backup-runner=$BACKUP_RUNNER_DIGEST"; do
              name="${pair%%=*}"; digest="${pair##*=}"
              docker buildx imagetools create \
                  --tag "ghcr.io/${owner}/${name}:${ROLLBACK_TAG}" \
                  "ghcr.io/${owner}/${name}@${digest}"
          done

  deploy-railway:
    name: Roll back Railway
    needs: [tag-rollback, resolve-digest]
    if: contains(inputs.platforms, 'railway')
    runs-on: ubuntu-latest
    environment: prod-railway
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_sha }}
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm install -g @railway/cli
      - name: railway up (rollback, pinned to digest)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PROD_TOKEN }}
          ODOO_DIGEST: ${{ needs.resolve-digest.outputs.odoo_digest }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "::notice::[dry-run] would deploy Railway service to digest ${ODOO_DIGEST}"
              echo "## Deploy → Railway (rollback)" >> "$GITHUB_STEP_SUMMARY"
              echo "- Status: **skipped (dry_run=true)**" >> "$GITHUB_STEP_SUMMARY"
              exit 0
          fi
          # See deploy-railway in promote-to-prod.yml for the
          # serviceInstanceUpdate GraphQL follow-up note.
          echo "::notice::Target digest for Railway rollback: ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/odoo-saas-odoo@${ODOO_DIGEST}"
          railway up --service "${{ secrets.RAILWAY_PROD_ODOO_SERVICE_ID }}" --detach

  deploy-fly:
    name: Roll back Fly
    needs: [tag-rollback, resolve-digest]
    if: contains(inputs.platforms, 'fly')
    runs-on: ubuntu-latest
    environment: prod-fly
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_sha }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: flyctl deploy (rollback, pinned to digest)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_PROD_API_TOKEN }}
          ODOO_DIGEST: ${{ needs.resolve-digest.outputs.odoo_digest }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/odoo-saas-odoo@${ODOO_DIGEST}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "::notice::[dry-run] would roll Fly back to ${image}"
              echo "## Deploy → Fly (rollback)" >> "$GITHUB_STEP_SUMMARY"
              echo "- Status: **skipped (dry_run=true)**" >> "$GITHUB_STEP_SUMMARY"
              exit 0
          fi
          flyctl deploy --config infra/fly/odoo-prod/fly.toml \
              --image "$image" --remote-only --strategy rolling \
              --wait-timeout 900

  parity-gate:
    name: Cross-platform parity gate (rollback)
    needs: [deploy-railway, deploy-fly]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          railway="${{ needs.deploy-railway.result }}"
          fly="${{ needs.deploy-fly.result }}"
          {
            echo "## Rollback parity gate"
            echo ""
            echo "| Platform | Result |"
            echo "|---|---|"
            echo "| Railway | \`$railway\` |"
            echo "| Fly | \`$fly\` |"
          } >> "$GITHUB_STEP_SUMMARY"
          # Asymmetric rollback (Railway succeeded, Fly failed or vice versa)
          # is the most dangerous state — code reverts on one platform, the
          # other still runs the bad version. Block tenant-restore.
          if [ "$railway" != "$fly" ] && [ "$railway" != "skipped" ] && [ "$fly" != "skipped" ]; then
              echo "::error::Rollback parity FAILED. Railway=$railway Fly=$fly. Tenant-restore aborted." >&2
              echo "- Verdict: **FAIL — tenant-restore blocked**" >> "$GITHUB_STEP_SUMMARY"
              exit 1
          fi
          echo "- Verdict: **OK**" >> "$GITHUB_STEP_SUMMARY"

  tenant-restore:
    name: Restore tenant data (optional)
    needs: [parity-gate, preflight]
    if: |
      always()
      && needs.parity-gate.result == 'success'
      && inputs.restore_data == 'true'
    runs-on: ubuntu-latest
    env:
      PG_DSN: ${{ secrets.CONTROL_PLANE_PG_DSN }}
      DRY_RUN: ${{ inputs.dry_run }}
      WAVE: ${{ inputs.wave }}
      TARGET_SHA: ${{ inputs.target_sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install migration-runner package
        if: env.DRY_RUN == 'false'
        # The daemon's rollback module composes with this workflow per its
        # docstring: rollback-prod.yml rolls back the IMAGE; rollback.py
        # rolls back the DATA. Together they restore a tenant to "the
        # state it was in before migration job X."
        run: pip install -e infra/runners/migration_runner/

      - name: Restore per tenant in wave (delegates to migration_runner.rollback)
        run: |
          set -euo pipefail
          {
            echo "## Tenant restore"
            echo ""
            echo "| Tenant | Job ID | Action |"
            echo "|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"
          # For each tenant in the wave, find the most recent migration
          # job whose applied_at is AFTER our rollback target_sha was last
          # applied — that's the job we need to undo. Pass its uuid to
          # the daemon's rollback module.
          rows=$(psql "$PG_DSN" -t -A -F '|' -c "
            SELECT j.id, t.slug
            FROM tenant_migration_jobs j
            JOIN tenants t ON t.id = j.tenant_id
            WHERE t.wave = '$WAVE' AND t.state = 'active'
              AND j.status = 'done'
              AND j.applied_at > coalesce(
                (SELECT max(applied_at) FROM tenant_migration_jobs
                 WHERE tenant_id = j.tenant_id AND target_sha = '$TARGET_SHA'),
                '-infinity'::timestamptz
              )
            ORDER BY j.applied_at DESC
          " || echo "")
          if [ -z "$rows" ]; then
              echo "::notice::No tenants in $WAVE need data rollback (no forward migrations since $TARGET_SHA)."
              echo "| — | — | no-op |" >> "$GITHUB_STEP_SUMMARY"
              exit 0
          fi
          printf '%s\n' "$rows" | while IFS='|' read -r job_id slug; do
              [ -z "$job_id" ] && continue
              if [ "$DRY_RUN" = "true" ]; then
                  echo "::notice::[dry-run] would rollback tenant $slug via job $job_id"
                  echo "| $slug | \`$job_id\` | dry-run skip |" >> "$GITHUB_STEP_SUMMARY"
                  continue
              fi
              if python -m migration_runner.rollback "$job_id"; then
                  echo "| $slug | \`$job_id\` | rolled back |" >> "$GITHUB_STEP_SUMMARY"
              else
                  echo "::error::migration_runner.rollback failed for $slug job=$job_id" >&2
                  echo "| $slug | \`$job_id\` | **FAIL** |" >> "$GITHUB_STEP_SUMMARY"
                  exit 1
              fi
          done

  smoke:
    name: Post-rollback smoke
    needs: [parity-gate, tenant-restore, preflight]
    if: |
      always()
      && needs.parity-gate.result == 'success'
    runs-on: ubuntu-latest
    env:
      TENANTS: ${{ needs.preflight.outputs.target_tenants }}
      BASE_DOMAIN: ${{ vars.TENANT_BASE_DOMAIN }}
      DRY_RUN: ${{ inputs.dry_run }}
    steps:
      - name: Health + login probe (mirror of promote smoke)
        run: |
          set -euo pipefail
          base="${BASE_DOMAIN:-app.goliatt.co}"
          [ -n "${TENANTS:-}" ] || TENANTS="[]"
          tenant_count=$(echo "$TENANTS" | jq -r '. | length // 0')
          {
            echo "## Post-rollback smoke"
            echo ""
            echo "| Tenant | URL | Result |"
            echo "|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$tenant_count" = "0" ]; then
              echo "| — | — | no tenants in wave |" >> "$GITHUB_STEP_SUMMARY"
              exit 0
          fi
          echo "$TENANTS" | jq -r '.[]?' | head -3 | while read -r t; do
              url="https://${t}.${base}/web/health"
              if [ "$DRY_RUN" = "true" ]; then
                  echo "| $t | $url | dry-run skip |" >> "$GITHUB_STEP_SUMMARY"
                  continue
              fi
              code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$url" || echo "000")
              if [ "$code" != "200" ]; then
                  echo "::error::Post-rollback smoke failed for $t (HTTP $code) — $url" >&2
                  echo "| $t | $url | FAIL ($code) |" >> "$GITHUB_STEP_SUMMARY"
                  exit 1
              fi
              echo "| $t | $url | OK |" >> "$GITHUB_STEP_SUMMARY"
          done

  audit:
    name: Audit log
    needs: [deploy-railway, deploy-fly, tenant-restore, smoke, tag-rollback]
    if: always()
    runs-on: ubuntu-latest
    env:
      PG_DSN: ${{ secrets.CONTROL_PLANE_PG_DSN }}
    steps:
      - run: |
          smoke_outcome="${{ needs.smoke.result }}"
          restore_outcome="${{ needs.tenant-restore.result }}"
          payload=$(jq -nc \
              --arg restore_data  "${{ inputs.restore_data }}" \
              --arg platforms     "${{ inputs.platforms }}" \
              --arg dry_run       "${{ inputs.dry_run }}" \
              --arg rollback_tag  "${{ needs.tag-rollback.outputs.rollback_tag }}" \
              --arg smoke         "$smoke_outcome" \
              --arg restore       "$restore_outcome" \
              --arg run_id        "${{ github.run_id }}" \
              '{restore_data:$restore_data,platforms:$platforms,dry_run:$dry_run,rollback_tag:$rollback_tag,smoke:$smoke,restore:$restore,run_id:$run_id}')
          psql "$PG_DSN" -c "
            INSERT INTO saas_audit.event
              (actor_kind, actor_name, action, target_kind, target_id, sha, wave, reason, payload)
            VALUES
              ('human', '${{ github.actor }}', 'rollback-prod', 'wave', '${{ inputs.wave }}',
               '${{ inputs.target_sha }}', '${{ inputs.wave }}', '${{ inputs.paste_back }}',
               '$payload'::jsonb)
          "

  notify:
    name: Notify Slack + page on-call
    needs: [audit]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\": \"⏪ ROLLBACK wave=${{ inputs.wave }} → ${{ inputs.target_sha }} by ${{ github.actor }} (dry_run=${{ inputs.dry_run }})\"}" \
            "${{ secrets.SLACK_DEPLOY_WEBHOOK }}"
