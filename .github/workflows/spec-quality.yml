# spec-quality
#
# Enforces quality checks on spec PRs from the Spec Generator agent.
# Per docs/superpowers/specs/2026-05-16-spec-generator-agent-design.md §5.3.4.
#
# A spec from the Spec Generator MUST:
#   - have all design-template sections present (template-completeness)
#   - have non-empty tenancy-impact section
#   - have ≥ 1 open question on design specs
#   - have a regression-test sketch on fix-briefs
#   - mention every addon it touches by name

name: spec-quality

on:
  pull_request:
    branches: [main]
    # Runs on every PR so the check can be made required on `main`.
    # Job short-circuits with a `notice` when no spec files are touched.

jobs:

  check:
    name: Spec quality checks
    runs-on: ubuntu-latest
    if: contains(github.head_ref, 'agent/spec-') || contains(github.head_ref, 'agent/spec-generator/')
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Identify spec files in this PR
        id: specs
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          specs=$(git diff --name-only "$BASE" "$HEAD" \
              | grep -E '^docs/superpowers/specs/[0-9]{4}-[0-9]{2}-[0-9]{2}-.*\.md$' \
              | grep -v '_TEMPLATE' || true)
          echo "$specs" > /tmp/specs.txt
          echo "::notice::Spec files in PR: $(wc -l </tmp/specs.txt)"

      - name: Template completeness (design specs)
        run: |
          set -euo pipefail
          required_design_sections=(
              "## 1. Goal"
              "## 2. Non-goals"
              "## 3. Tenancy impact"
              "## 4. Data model"
              "## 5. API surface"
              "## 6. Security model"
              "## 7. Test plan"
              "## 8. Rollout"
              "## 9. Observability"
              "## 10. Open questions"
          )
          required_fix_sections=(
              "## 1. Symptom"
              "## 2. Repro"
              "## 3. Affected"
              "## 4. Root cause"
              "## 5. Proposed fix"
              "## 6. Regression test"
              "## 7. Rollout"
          )
          fail=0
          while read spec; do
              [ -z "$spec" ] && continue
              if [[ "$spec" == *-design.md ]]; then
                  for section in "${required_design_sections[@]}"; do
                      if ! grep -q "^${section}" "$spec"; then
                          echo "::error file=$spec::Missing section: $section"
                          fail=1
                      fi
                  done
              elif [[ "$spec" == *-fix.md ]]; then
                  for section in "${required_fix_sections[@]}"; do
                      if ! grep -q "^${section}" "$spec"; then
                          echo "::error file=$spec::Missing section: $section"
                          fail=1
                      fi
                  done
              fi
          done < /tmp/specs.txt
          [ "$fail" -eq 0 ]

      - name: Tenancy-impact non-empty (design specs)
        run: |
          set -euo pipefail
          fail=0
          while read spec; do
              [ -z "$spec" ] && continue
              [[ "$spec" != *-design.md ]] && continue
              # Extract section 3 body and check it has > 100 chars of substantive content
              body=$(awk '/^## 3\. Tenancy impact/,/^## 4\./' "$spec" \
                  | sed '1d;$d' | grep -v '^$' | wc -c)
              if [ "$body" -lt 100 ]; then
                  echo "::error file=$spec::Tenancy-impact section is too short (< 100 chars). The spec-quality check fails if this is missing or trivially short."
                  fail=1
              fi
          done < /tmp/specs.txt
          [ "$fail" -eq 0 ]

      - name: ≥ 1 open question on design specs
        run: |
          set -euo pipefail
          fail=0
          while read spec; do
              [ -z "$spec" ] && continue
              [[ "$spec" != *-design.md ]] && continue
              q_count=$(awk '/^## (10|14|15|16)\. Open questions/,/^## [0-9]/' "$spec" \
                  | grep -cE '^[0-9]+\.' || true)
              if [ "$q_count" -lt 1 ]; then
                  echo "::error file=$spec::Design spec must include ≥ 1 open question. We don't trust artefacts that have 'no questions'."
                  fail=1
              fi
          done < /tmp/specs.txt
          [ "$fail" -eq 0 ]

      - name: Regression-test sketch on fix-briefs
        run: |
          set -euo pipefail
          fail=0
          while read spec; do
              [ -z "$spec" ] && continue
              [[ "$spec" != *-fix.md ]] && continue
              if ! grep -qE '^```python|^```ruby|^```javascript|^def test_|^it\(' "$spec"; then
                  echo "::warning file=$spec::Fix-brief should include a regression-test sketch (code block)"
              fi
          done < /tmp/specs.txt
