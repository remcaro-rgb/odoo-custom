# GHCR image publish (Phase 3 prerequisite).
#
# The per-tenant exclusive-tier provisioning workflow (moveTier in the
# control plane) creates new Postgres + Odoo deployables on Railway and Fly
# referencing a pull-able container image. Without published images, those
# spec.image fields point at nothing and the platform's image-pull step
# fails immediately.
#
# This workflow builds the Odoo and Postgres images on every push to main
# and on every git tag, then pushes them to GHCR under:
#   ghcr.io/<owner>/odoo-saas-odoo
#   ghcr.io/<owner>/odoo-saas-postgres
#   ghcr.io/<owner>/odoo-saas-backup-runner
#
# Tags applied:
#   - `latest`         — moving tag, follows main
#   - `sha-<7chars>`   — short commit SHA, immutable
#   - `<git-tag>`      — when triggered by a tagged release
#
# The control plane's TENANT_POSTGRES_IMAGE / TENANT_ODOO_IMAGE env vars
# pin a specific tag in production — never `latest` — so moveTier
# provisions a known good image version even if main moves forward.
#
# Image visibility defaults to PRIVATE for new packages on GHCR. The
# Railway/Fly side needs read access:
#   - Railway: paste the GHCR PAT into Project → Settings → Variables as
#     a registry-credentials secret, or attach via the service's
#     `registryCredentials` GraphQL input.
#   - Fly: `flyctl secrets set DOCKER_PASSWORD=<ghcr-PAT>` on each per-
#     tenant app, OR (cleaner) make the image public via the GHCR
#     package settings.

name: GHCR Publish

on:
  push:
    branches: [main]
    tags:
      - 'v*'                # standard image releases
      - 'enterprise-v*'     # enterprise self-host variant — see publish-enterprise
  workflow_dispatch:
    inputs:
      variant:
        description: 'Which set of images to build'
        type: choice
        required: true
        default: standard
        options: [standard, enterprise, both]

concurrency:
  group: ghcr-publish-${{ github.ref }}
  cancel-in-progress: false   # finish in-flight pushes; don't lose tags

permissions:
  contents: read
  packages: write       # ghcr.io/<owner>/* push
  id-token: write       # cosign keyless signing — GitHub OIDC token
                        # is what the cosign step exchanges with
                        # Sigstore's Fulcio for an ephemeral cert.

jobs:
  publish-standard:
    name: Build + push ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    # Standard images build on main pushes, v* tags, and explicit
    # standard|both workflow_dispatch. enterprise-v* tag pushes
    # intentionally do NOT rebuild these (the underlying commit was
    # already built when it landed on main).
    if: >-
      ${{ github.event_name != 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/enterprise-v')
          || (github.event_name == 'workflow_dispatch'
              && (github.event.inputs.variant == 'standard'
                  || github.event.inputs.variant == 'both')) }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: odoo-saas-odoo
            dockerfile: ./Dockerfile
            context: .
          - name: odoo-saas-postgres
            dockerfile: ./infra/postgres/Dockerfile
            context: .
          - name: odoo-saas-backup-runner
            dockerfile: ./infra/backup-runner/Dockerfile
            # Repo root — the Dockerfile uses `COPY infra/backup-runner/...`
            # paths, not local-context paths. Same convention as the odoo
            # and postgres images.
            context: .

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: tags
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE="ghcr.io/${OWNER}/${{ matrix.image.name }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAGS="${IMAGE}:sha-${SHORT_SHA}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            TAGS="${TAGS},${IMAGE}:${TAG_NAME}"
          fi
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build + push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
          provenance: false   # keep manifest list-of-1 simple for platform pulls

      # Phase 4.1: cosign keyless signing. saas_license_gate (the
      # enterprise self-host addon) verifies this signature on first
      # boot, refusing to start an image that wasn't published through
      # this workflow + signed by the org's GitHub OIDC identity.
      # Keyless = no cosign private key to manage; the chain of trust
      # is: GitHub OIDC token → Sigstore Fulcio short-lived cert →
      # transparency-log entry on Rekor.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless via GitHub OIDC)
        env:
          COSIGN_EXPERIMENTAL: '1'
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE="ghcr.io/${OWNER}/${{ matrix.image.name }}"
          # Sign by digest, not by tag — tags can be retagged later, the
          # digest can't. The signature is published as a separate
          # OCI artifact at <image>:sha256-<digest>.sig (Rekor uploads
          # the transparency-log entry automatically).
          cosign sign --yes "${IMAGE}@${DIGEST}"

      # Tier 7: SLSA-3 provenance attestation. promote-to-prod's
      # resolve-digest job runs `cosign verify-attestation` against the
      # same OIDC identity, blocking promotes of images that don't have
      # a provenance trail back to *this* workflow.
      - name: Generate + attest SLSA provenance
        env:
          COSIGN_EXPERIMENTAL: '1'
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE="ghcr.io/${OWNER}/${{ matrix.image.name }}"
          predicate=$(jq -n \
              --arg builder      "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/ghcr-publish.yml@${GITHUB_REF}" \
              --arg buildType    "https://github.com/actions/runner@v2" \
              --arg invocationId "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
              --arg sourceUri    "git+https://github.com/${GITHUB_REPOSITORY}@${GITHUB_REF}" \
              --arg sourceSha    "${GITHUB_SHA}" \
              --arg startedOn    "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{
                buildType: $buildType,
                builder:   {id: $builder},
                invocation: {
                  configSource: {uri: $sourceUri, digest: {sha1: $sourceSha},
                                 entryPoint: ".github/workflows/ghcr-publish.yml"},
                  parameters: {},
                  environment: {invocationId: $invocationId}
                },
                metadata: {
                  buildStartedOn: $startedOn,
                  completeness:   {parameters: true, environment: false, materials: true},
                  reproducible:   false
                },
                materials: [{uri: $sourceUri, digest: {sha1: $sourceSha}}]
              }')
          echo "$predicate" > /tmp/slsa-predicate.json
          cosign attest --yes \
              --predicate /tmp/slsa-predicate.json \
              --type slsaprovenance \
              "${IMAGE}@${DIGEST}"

  # Phase 4.1: enterprise self-host image. Same Odoo Dockerfile as the
  # standard image, but COPY'd in with the rotated production pubkey
  # via --build-arg LICENSE_PUBKEY_FILE=infra/keys/license-signing-pubkey.pem.
  # Published as a separate package (`odoo-saas-odoo-enterprise`) so the
  # operator can hand a customer a single image:tag pair without it
  # being confusable with the shared-pool image.
  #
  # Trigger: `enterprise-v*` git tag push (e.g. `git tag enterprise-v1`)
  # or workflow_dispatch with variant=enterprise|both.
  # Standard `v*` and `latest` flows do NOT rebuild this — enterprise
  # promotion is intentionally a separate, human-driven cut.
  publish-enterprise:
    name: Build + push odoo-saas-odoo-enterprise
    runs-on: ubuntu-latest
    if: >-
      ${{ startsWith(github.ref, 'refs/tags/enterprise-v')
          || (github.event_name == 'workflow_dispatch'
              && (github.event.inputs.variant == 'enterprise'
                  || github.event.inputs.variant == 'both')) }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Verify production pubkey is committed
        run: |
          if [ ! -f infra/keys/license-signing-pubkey.pem ]; then
            echo "::error::infra/keys/license-signing-pubkey.pem is missing." \
                 "Step 1 of the enterprise-onboarding runbook must run before" \
                 "the first enterprise build (rotate the Ed25519 signing key)."
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: tags
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE="ghcr.io/${OWNER}/odoo-saas-odoo-enterprise"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAGS="${IMAGE}:sha-${SHORT_SHA}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            # enterprise-v1, enterprise-v1.1, enterprise-<customer-slug>, ...
            TAGS="${TAGS},${IMAGE}:${GITHUB_REF_NAME}"
          fi
          # No `:latest` for the enterprise package on purpose — the
          # operator pins customers to an immutable enterprise-vN tag.
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build + push (enterprise pubkey)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            LICENSE_PUBKEY_FILE=infra/keys/license-signing-pubkey.pem
          # Separate buildx cache scope so the enterprise build doesn't
          # poison or get poisoned by the standard scope.
          cache-from: type=gha,scope=odoo-saas-odoo-enterprise
          cache-to: type=gha,scope=odoo-saas-odoo-enterprise,mode=max
          provenance: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless via GitHub OIDC)
        env:
          COSIGN_EXPERIMENTAL: '1'
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE="ghcr.io/${OWNER}/odoo-saas-odoo-enterprise"
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Generate + attest SLSA provenance
        env:
          COSIGN_EXPERIMENTAL: '1'
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE="ghcr.io/${OWNER}/odoo-saas-odoo-enterprise"
          predicate=$(jq -n \
              --arg builder      "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/ghcr-publish.yml@${GITHUB_REF}" \
              --arg buildType    "https://github.com/actions/runner@v2" \
              --arg invocationId "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
              --arg sourceUri    "git+https://github.com/${GITHUB_REPOSITORY}@${GITHUB_REF}" \
              --arg sourceSha    "${GITHUB_SHA}" \
              --arg startedOn    "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{
                buildType: $buildType,
                builder:   {id: $builder},
                invocation: {
                  configSource: {uri: $sourceUri, digest: {sha1: $sourceSha},
                                 entryPoint: ".github/workflows/ghcr-publish.yml"},
                  parameters: {variant: "enterprise"},
                  environment: {invocationId: $invocationId}
                },
                metadata: {
                  buildStartedOn: $startedOn,
                  completeness:   {parameters: true, environment: false, materials: true},
                  reproducible:   false
                },
                materials: [{uri: $sourceUri, digest: {sha1: $sourceSha}}]
              }')
          echo "$predicate" > /tmp/slsa-predicate-enterprise.json
          cosign attest --yes \
              --predicate /tmp/slsa-predicate-enterprise.json \
              --type slsaprovenance \
              "${IMAGE}@${DIGEST}"

      - name: Emit digest for operator
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE="ghcr.io/${OWNER}/odoo-saas-odoo-enterprise"
          {
            echo "## Enterprise image published"
            echo ""
            echo "**Image:** \`${IMAGE}@${DIGEST}\`"
            echo ""
            echo "**Tags:** ${{ steps.tags.outputs.tags }}"
            echo ""
            echo "Use the digest above as the customer's \`image_sha256\` when"
            echo "minting their license (\`license-cli.sh issue\`)."
          } >> "$GITHUB_STEP_SUMMARY"
