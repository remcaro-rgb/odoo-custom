# agentlab-daily-restore
#
# Implements docs/superpowers/specs/2026-05-16-agentlab-environment-design.md
# §4 (restore pipeline) and §5 (masking).
#
# Nightly 02:00 UTC the workflow:
#   1. Opens flyctl proxy tunnels to the agentlab Postgres (and, if
#      configured, the staging Postgres) — both live on Fly's private
#      6PN network and are unreachable from a GitHub-hosted runner
#      without a tunnel.
#   2. Wakes the agentlab Fly app (auto_stop is on).
#   3. Pulls a fresh pg_dump from each staging tenant.
#   4. Restores into the agentlab Postgres (drop + create db per tenant).
#   5. Runs infra/agentlab/mask_prod_data.py — type-based masking +
#      deny-list pass + sample-row PII audit (the audit gates the run:
#      surviving PII fails the workflow before redeploy).
#   6. Rotates the agentlab reviewer one-time password.
#   7. Writes a saas_audit.event row.
#
# Connectivity model:
#   - agentlab Postgres (odoo-saas-odoo-agentlab-db): Fly-private, ALWAYS
#     proxied to 127.0.0.1:15432.
#   - staging Postgres: proxied to 127.0.0.1:15433 only when the repo
#     variable STAGING_PG_FLY_APP is set (= the staging Postgres is also
#     a Fly app). If it is unset, STAGING_PG_DSN is used as-is — correct
#     when staging Postgres is publicly reachable (e.g. Railway/Neon).
#   - control-plane Postgres (Neon): public, never proxied.
#
# Manual dispatch is supported for fix-up runs; pass `tenant_filter=<name>`
# to restore just one tenant.

name: agentlab-daily-restore

on:
  schedule:
    - cron: '0 2 * * *'    # daily 02:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip mutations; report only.'
        default: 'true'
        type: choice
        options: ['true', 'false']
      tenant_filter:
        description: 'Optional single tenant slug to restore; blank = all'
        required: false

concurrency:
  group: agentlab-daily-restore
  cancel-in-progress: false

permissions:
  contents: read

env:
  AGENTLAB_PROXY_PORT: '15432'
  STAGING_PROXY_PORT: '15433'

jobs:

  restore:
    name: Restore + mask agentlab
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Org-scoped token — this workflow touches THREE Fly apps
      # (odoo-saas-odoo-agentlab, -agentlab-db, odoo-saas-postgres) and
      # `flyctl proxy` must query each app's network. The shared
      # FLY_API_TOKEN is a deploy token scoped to odoo-saas-odoo only,
      # which 401s on the cross-app GraphQL query (see .github/SECRETS.md).
      FLY_API_TOKEN: ${{ secrets.FLY_AGENTLAB_TOKEN }}
      STAGING_PG_DSN: ${{ secrets.STAGING_PG_DSN }}
      AGENTLAB_DSN: ${{ secrets.AGENTLAB_DSN }}
      CONTROL_PLANE_PG_DSN: ${{ secrets.CONTROL_PLANE_PG_DSN }}
      STAGING_PG_FLY_APP: ${{ vars.STAGING_PG_FLY_APP }}
      TENANT_FILTER: ${{ inputs.tenant_filter }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Preflight — check secrets
        run: |
          set -euo pipefail
          : "${FLY_API_TOKEN:?FLY_API_TOKEN required}"
          : "${AGENTLAB_DSN:?AGENTLAB_DSN required}"
          : "${CONTROL_PLANE_PG_DSN:?CONTROL_PLANE_PG_DSN required for audit-event write}"
          if [ "${DRY_RUN}" = "false" ]; then
            : "${STAGING_PG_DSN:?STAGING_PG_DSN required for a real restore}"
          fi

      - name: Open Fly proxy tunnels
        run: |
          set -euo pipefail
          # agentlab Postgres — always needed (the masker connects to it
          # in dry-run too). Background the proxy; it persists for the
          # rest of the job (same runner) and is killed by the cleanup
          # step below.
          nohup flyctl proxy "${AGENTLAB_PROXY_PORT}:5432" \
            -a odoo-saas-odoo-agentlab-db \
            > /tmp/proxy-agentlab.log 2>&1 &
          echo $! > /tmp/proxy-agentlab.pid

          # staging Postgres — only when it's a Fly app (repo var set)
          # and we're doing a real restore (dry-run never touches staging).
          if [ "${DRY_RUN}" = "false" ] && [ -n "${STAGING_PG_FLY_APP:-}" ]; then
            nohup flyctl proxy "${STAGING_PROXY_PORT}:5432" \
              -a "${STAGING_PG_FLY_APP}" \
              > /tmp/proxy-staging.log 2>&1 &
            echo $! > /tmp/proxy-staging.pid
          fi

          # Wait for the agentlab tunnel to accept connections.
          for _ in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p "${AGENTLAB_PROXY_PORT}" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          if ! pg_isready -h 127.0.0.1 -p "${AGENTLAB_PROXY_PORT}" >/dev/null 2>&1; then
            echo "::error::agentlab proxy never became reachable on 127.0.0.1:${AGENTLAB_PROXY_PORT}"
            cat /tmp/proxy-agentlab.log
            exit 1
          fi
          if [ -f /tmp/proxy-staging.pid ]; then
            for _ in $(seq 1 30); do
              if pg_isready -h 127.0.0.1 -p "${STAGING_PROXY_PORT}" >/dev/null 2>&1; then
                break
              fi
              sleep 1
            done
            if ! pg_isready -h 127.0.0.1 -p "${STAGING_PROXY_PORT}" >/dev/null 2>&1; then
              echo "::error::staging proxy never became reachable on 127.0.0.1:${STAGING_PROXY_PORT}"
              cat /tmp/proxy-staging.log
              exit 1
            fi
          fi
          echo "::notice::Fly proxy tunnel(s) up"

      - name: Resolve effective DSNs
        run: |
          set -euo pipefail
          # Repoint AGENTLAB_DSN at the local tunnel. The rewritten value
          # overrides the job-level env for every subsequent step.
          agentlab_local=$(python3 infra/scripts/dsn_rewrite_host.py \
            "${AGENTLAB_DSN}" "127.0.0.1:${AGENTLAB_PROXY_PORT}")
          echo "::add-mask::${agentlab_local}"
          echo "AGENTLAB_DSN=${agentlab_local}" >> "$GITHUB_ENV"

          # staging: rewrite only if we proxied it; otherwise keep as-is.
          if [ -f /tmp/proxy-staging.pid ]; then
            staging_local=$(python3 infra/scripts/dsn_rewrite_host.py \
              "${STAGING_PG_DSN}" "127.0.0.1:${STAGING_PROXY_PORT}")
            echo "::add-mask::${staging_local}"
            echo "STAGING_PG_DSN=${staging_local}" >> "$GITHUB_ENV"
          fi

      # NOTE: the agentlab Odoo app is deliberately NOT started here.
      # Restore + masking talk to Postgres directly; a running Odoo app
      # would hold connection-pool connections to the very tenant DBs the
      # restore is about to DROP. The OTP-rotation step's `flyctl deploy`
      # brings the app up fresh at the end.

      - name: Discover tenants
        id: tenants
        if: env.DRY_RUN == 'false'
        run: |
          set -euo pipefail
          # If a filter was passed via workflow_dispatch, use it; otherwise
          # list active tenants in the staging pool.
          if [ -n "${TENANT_FILTER:-}" ]; then
            echo "$TENANT_FILTER" > /tmp/tenants.txt
          else
            # 'repmgr' excluded too — if the staging Postgres is a Fly
            # flex cluster it carries a repmgr metadata DB that must not
            # be dumped/restored as if it were a tenant.
            psql "$STAGING_PG_DSN" -t -A -c \
              "SELECT datname FROM pg_database
                WHERE datname NOT IN ('postgres','template0','template1','repmgr')
                  AND NOT datistemplate;" \
              > /tmp/tenants.txt
          fi
          count=$(wc -l </tmp/tenants.txt | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "::notice::will restore $count tenant(s)"
          cat /tmp/tenants.txt

      - name: Dump & restore per tenant
        if: env.DRY_RUN == 'false'
        run: |
          set -euo pipefail
          while read -r tenant; do
            [ -z "$tenant" ] && continue
            echo "::group::Restoring $tenant"

            # pg_dump from staging (no data we don't already have access to)
            tmpdump=$(mktemp /tmp/agentlab-restore-XXXXXX.dump)
            pg_dump --format=custom --no-owner --no-privileges \
              --dbname="${STAGING_PG_DSN%/*}/$tenant" \
              --file="$tmpdump"

            # Drop + recreate the agentlab tenant DB. WITH (FORCE)
            # (PG13+) terminates any lingering connections — a stray
            # psql, a pgbouncer pool, or the agentlab Odoo app if it
            # was woken out of band — so the DROP can't fail with
            # "database is being accessed by other users".
            agentlab_admin_dsn="${AGENTLAB_DSN%/*}/postgres"
            psql "$agentlab_admin_dsn" -c "DROP DATABASE IF EXISTS \"$tenant\" WITH (FORCE);"
            psql "$agentlab_admin_dsn" -c "CREATE DATABASE \"$tenant\";"

            # Restore
            pg_restore --no-owner --no-privileges \
              --dbname="${AGENTLAB_DSN%/*}/$tenant" \
              "$tmpdump"
            rm -f "$tmpdump"

            echo "::endgroup::"
          done < /tmp/tenants.txt

      - name: Set up Python for masking
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install masking dependencies
        run: pip install 'psycopg2-binary==2.9.10' 'pyyaml==6.0.2'

      - name: Apply masking pipeline + sample-row PII audit
        if: env.DRY_RUN == 'false'
        run: |
          set -euo pipefail
          # `pipefail` is REQUIRED: without it the `| tee` below takes tee's
          # exit code (0) and the masker's non-zero exit is SWALLOWED — a
          # failed/rolled-back tenant mask would pass CI and leave unmasked
          # data in agentlab (see issue #143).
          #
          # mask_prod_data.py applies type-based masking + the deny-list
          # pass to every database in the agentlab cluster, then samples
          # rows for surviving PII and smoke-checks structural tables. It exits:
          #   0  masked + audit + structural smoke clean
          #   1  config/connection error
          #   2  surviving PII, OR a structural table was masked  → this step
          #      (and the whole restore) fails, and agentlab is NOT redeployed
          #      with unmasked / unloadable data.
          # AGENTLAB_DSN here is the proxied 127.0.0.1 form.
          python3 infra/agentlab/mask_prod_data.py \
            --allowlist infra/agentlab/mask-allowlist.yml \
            --rules infra/agentlab/masking-rules.yml \
            | tee /tmp/masking.log

      - name: Masking dry-run check
        if: env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          # pipefail so a masker error isn't swallowed by `| tee` (#143).
          # In dry-run we only confirm the masker connects (over the
          # proxy) and classifies; no UPDATEs are applied.
          python3 infra/agentlab/mask_prod_data.py --dry-run \
            | tee /tmp/masking-dryrun.log

      - name: Rotate reviewer OTP
        if: env.DRY_RUN == 'false'
        run: |
          # Generate a fresh one-time password and inject into agentlab as
          # a Fly secret. Reviewers retrieve it from the runbook or Slack.
          otp=$(openssl rand -base64 18 | tr -d '=+/' | cut -c1-24)
          flyctl secrets set \
            --app odoo-saas-odoo-agentlab \
            --stage \
            "AGENTLAB_REVIEWER_OTP=$otp"
          flyctl deploy --app odoo-saas-odoo-agentlab \
            --strategy immediate \
            --config infra/fly/agentlab/fly.toml \
            --remote-only
          echo "::notice::agentlab reviewer OTP rotated. Retrieve via flyctl secrets."

      - name: Write audit event
        if: env.DRY_RUN == 'false' && always()
        run: |
          # CONTROL_PLANE_PG_DSN is Neon — publicly reachable, no proxy.
          psql "$CONTROL_PLANE_PG_DSN" -c "
            INSERT INTO saas_audit.event
              (actor_kind, actor_name, action, target_kind, payload)
            VALUES
              ('system', 'agentlab-daily-restore', 'agentlab-restored',
               'fly-app',
               jsonb_build_object(
                 'tenant_count', ${{ steps.tenants.outputs.count || 0 }},
                 'tenant_filter', '${{ inputs.tenant_filter }}',
                 'dry_run', '${{ inputs.dry_run }}',
                 'workflow_run_id', '${{ github.run_id }}'
               ))
          "

      - name: Close Fly proxy tunnels
        if: always()
        run: |
          for pidfile in /tmp/proxy-agentlab.pid /tmp/proxy-staging.pid; do
            if [ -f "$pidfile" ]; then
              kill "$(cat "$pidfile")" 2>/dev/null || true
            fi
          done
          echo "::notice::Fly proxy tunnel(s) closed"
