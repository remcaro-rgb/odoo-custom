# Spec Generator Agent — reporter iteration trigger (Tier 2).
#
# DEPLOY TARGET: copy into the DATA-PLANE repo's `.github/workflows/`.
# INERT in this repo (not under `.github/`).
#
# Fires when a comment is created on an issue OR on the spec PR. The agent
# looks up the OpenCode session id from the session store, runs
# /speckit.clarify in that session, and pushes the updated spec.
name: Spec Generator - reporter iteration

on:
  issue_comment:
    types: [created]

concurrency:
  # Serialise iterations on the same issue / PR — back-to-back comments
  # within seconds otherwise race on the same OpenCode session.
  group: spec-gen-iter-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: read
  pull-requests: read  # Needed so `gh pr view` resolves the head branch.

jobs:
  iterate:
    # Don't iterate on bots — the agent's own comments would otherwise loop.
    # The webhook adapter re-checks; this guard avoids spinning an idle runner.
    if: github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the data-plane repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # If the comment lives on a PR we want to check out that branch so
          # the spec edit pushes onto the right ref. `gh pr checkout` later
          # in the run handles this for the PR-comment path; the plain-issue
          # path keeps the default-branch checkout.
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the Spec Generator
        # See spec-generator.yml for the psycopg rationale (Tier 3 RunStore
        # + Tier 5 KB both need it; without it they silently degrade).
        run: |
          pip install "git+https://github.com/remcaro-rgb/Odoo-saas-agents.git@${{ vars.AGENT_REF || 'main' }}"
          pip install "psycopg[binary]>=3.2"

      - name: Mint a token for the spec-generator-bot GitHub App
        id: bot_token
        if: ${{ vars.SPEC_GENERATOR_BOT_APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SPEC_GENERATOR_BOT_APP_ID }}
          private-key: ${{ secrets.SPEC_GENERATOR_BOT_PRIVATE_KEY }}

      - name: Check out the spec PR branch (PR comments only)
        if: github.event.issue.pull_request != null
        env:
          GH_TOKEN: ${{ steps.bot_token.outputs.token || github.token }}
        run: |
          gh pr checkout ${{ github.event.issue.number }} || true

      - name: Run the agent (refiner path)
        env:
          OPENCODE_BASE_URL: ${{ vars.OPENCODE_BASE_URL }}
          OPENCODE_SERVER_PASSWORD: ${{ secrets.OPENCODE_SERVER_PASSWORD }}
          DATA_PLANE_REPO: ${{ github.repository }}
          WORKSPACE_ROOT: ${{ github.workspace }}
          AGENTS_ENABLED: ${{ vars.AGENTS_ENABLED }}
          ROLLOUT_STAGE: ${{ vars.SPEC_GEN_ROLLOUT_STAGE || 'shadow' }}
          ROLLOUT_FIXTURES: ${{ vars.SPEC_GEN_ROLLOUT_FIXTURES }}
          ROLLOUT_OPT_IN: ${{ vars.SPEC_GEN_ROLLOUT_OPT_IN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SPEC_GENERATOR_BOT_APP_ID: ${{ vars.SPEC_GENERATOR_BOT_APP_ID }}
          GH_TOKEN: ${{ steps.bot_token.outputs.token }}
          # Observability: see spec-generator.yml for the same pair.
          AXIOM_TOKEN: ${{ secrets.AXIOM_TOKEN }}
          AXIOM_DATASET: ${{ vars.AXIOM_DATASET }}
          # Tier 3 state: see spec-generator.yml. Reporter iterations bump
          # last_reporter_activity_at and (on /confirm) advance the phase
          # to intent_confirmed.
          CONTROL_PLANE_PG_DSN: ${{ secrets.CONTROL_PLANE_PG_DSN }}
          # Tier 4 bug repro — see spec-generator.yml. Iterations don't
          # call the shim themselves but the agent reads both env vars in
          # one place so the iterate flow stays symmetric with draft.
          AGENTLAB_SHIM_URL: ${{ secrets.AGENTLAB_SHIM_URL }}
          AGENTLAB_SHIM_TOKEN: ${{ secrets.AGENTLAB_SHIM_TOKEN }}
          # Tier 5 dup detection — same symmetry note as Tier 4.
          EMBEDDINGS_SHIM_URL: ${{ secrets.EMBEDDINGS_SHIM_URL }}
          EMBEDDINGS_SHIM_TOKEN: ${{ secrets.EMBEDDINGS_SHIM_TOKEN }}
        run: python -m agents.spec_generator
