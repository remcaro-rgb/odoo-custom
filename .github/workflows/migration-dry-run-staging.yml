# Phase 2 P2.8 (full variant) — migration dry-run against a staging tenant
# DB snapshot. Pulls a recent masked snapshot from agentlab, restores it
# into a job-local Postgres, and runs `odoo -u all` to exercise every
# migration script + XML reload against real-shaped data.
#
# The lightweight P2.8 in `.github/workflows/ci.yml::migration-dry-run`
# catches syntax errors + `_register_hook` bugs against an EMPTY freshly-
# installed DB. This job catches the bigger class: migrations that
# misbehave on populated data (a `UPDATE x SET ...` that returns NULL
# for some rows, a unique constraint that holds on an empty table but
# fails when populated, a pre-migrate hook that inspects `ir_model`
# row-by-row).
#
# Triggers ONLY on push to main + manual dispatch — too expensive
# (15–25 min) for every PR.
#
# Required secrets:
#   FLY_AGENTLAB_TOKEN — Fly token that can `flyctl proxy` to the
#                       agentlab apps. The shared FLY_API_TOKEN is
#                       scoped to odoo-saas-odoo only and 401s on
#                       cross-app GraphQL (see .github/SECRETS.md +
#                       the comment in agentlab-daily-restore.yml).
#   AGENTLAB_DSN       — DSN for the agentlab Postgres. Has a Fly-
#                       private hostname; rewritten via
#                       `infra/scripts/dsn_rewrite_host.py` to
#                       127.0.0.1:15432 once the proxy is up.
#
# Optional repo variable:
#   P28_REPRESENTATIVE_TENANT — slug of the tenant to pull. Defaults
#                              to the first tenant DB found in the
#                              agentlab Postgres (most-recently-touched).
#
# The agentlab daily-restore (.github/workflows/agentlab-daily-restore.yml)
# masks every tenant snapshot before it lands in agentlab. This job
# inherits that masking; it does NOT re-mask, and it MUST NOT pull
# directly from staging.

name: migration-dry-run-staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tenant:
        description: 'Tenant slug to dry-run against (blank = pick first available)'
        required: false

concurrency:
  group: migration-dry-run-staging
  cancel-in-progress: false

permissions:
  contents: read

env:
  AGENTLAB_PROXY_PORT: '15432'
  # `services.postgres` exposes 5432; agentlab proxy lives on 15432.

jobs:

  dry-run:
    name: Migration dry-run (-u all on staging snapshot)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U odoo -d postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      # Must be the agentlab-scoped token, NOT the shared deploy token.
      FLY_API_TOKEN: ${{ secrets.FLY_AGENTLAB_TOKEN }}
      AGENTLAB_DSN: ${{ secrets.AGENTLAB_DSN }}
      TENANT_OVERRIDE: ${{ inputs.tenant || vars.P28_REPRESENTATIVE_TENANT }}
    steps:
      - name: Preflight — secrets present?
        id: preflight
        env:
          FLY_TOKEN_PRESENT: ${{ secrets.FLY_AGENTLAB_TOKEN != '' }}
          AGENTLAB_DSN_PRESENT: ${{ secrets.AGENTLAB_DSN != '' }}
        run: |
          if [ "$FLY_TOKEN_PRESENT" != "true" ] || [ "$AGENTLAB_DSN_PRESENT" != "true" ]; then
            echo "::warning::FLY_AGENTLAB_TOKEN or AGENTLAB_DSN not configured — skipping. The agentlab-daily-restore workflow sets up these secrets; first successful run unblocks this job."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.preflight.outputs.skip != 'true'
        with:
          submodules: recursive
          fetch-depth: 1

      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.preflight.outputs.skip != 'true'

      - name: Install PostgreSQL 17 client (match agentlab server major)
        if: steps.preflight.outputs.skip != 'true'
        run: |
          set -euo pipefail
          # The agentlab source DB is Postgres 17.x; ubuntu-latest ships
          # pg_dump 16, which refuses to dump a newer server ("aborting
          # because of server version mismatch"). Install the v17 client
          # from PGDG and put it ahead of the runner's v16 on PATH so both
          # psql and pg_dump are v17 for the steps below.
          sudo apt-get update
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Open flyctl proxy to agentlab Postgres
        if: steps.preflight.outputs.skip != 'true'
        run: |
          set -euo pipefail
          # Background — sleep until the job ends. Don't `set -e` exit
          # on flyctl's non-zero idle exits; the tunnel is healthy as
          # long as the listening port answers.
          nohup flyctl proxy "${AGENTLAB_PROXY_PORT}:5432" \
            -a odoo-saas-odoo-agentlab-db \
            > /tmp/flyctl-proxy.log 2>&1 &
          echo $! > /tmp/flyctl-proxy.pid
          # Wait for the listener — up to 60s.
          for i in $(seq 1 60); do
            if nc -z 127.0.0.1 "${AGENTLAB_PROXY_PORT}" 2>/dev/null; then
              echo "flyctl proxy ready on 127.0.0.1:${AGENTLAB_PROXY_PORT}"
              exit 0
            fi
            sleep 1
          done
          echo "::error::flyctl proxy never became reachable"
          cat /tmp/flyctl-proxy.log
          exit 1

      - name: Pick representative tenant + pg_dump
        if: steps.preflight.outputs.skip != 'true'
        run: |
          set -euo pipefail
          # Rewrite AGENTLAB_DSN's host to 127.0.0.1:proxy. The DSN's
          # user/pass/database/query string are preserved.
          rewritten=$(python3 infra/scripts/dsn_rewrite_host.py \
            "$AGENTLAB_DSN" "127.0.0.1:${AGENTLAB_PROXY_PORT}")
          # Pull user + password from the rewritten DSN. (Keep them
          # out of the workflow log — both go via env vars, not args.)
          export PGUSER=$(python3 -c "from urllib.parse import urlparse; print(urlparse('$rewritten').username)")
          export PGPASSWORD=$(python3 -c "from urllib.parse import urlparse; print(urlparse('$rewritten').password)")
          export PGHOST=127.0.0.1
          export PGPORT="${AGENTLAB_PROXY_PORT}"

          # Determine the tenant DB. Override via input/var; else pick the
          # first non-template database in the agentlab Postgres.
          tenant="${TENANT_OVERRIDE}"
          if [ -z "$tenant" ]; then
            tenant=$(psql -tAc \
              "SELECT datname FROM pg_database \
                WHERE datistemplate = false \
                  AND datname NOT IN ('postgres','agentlab_meta') \
                ORDER BY pg_database_size(oid) DESC \
                LIMIT 1")
            tenant="${tenant// /}"  # strip whitespace
          fi
          if [ -z "$tenant" ]; then
            echo "::warning::No tenant DBs in agentlab yet (the daily-restore workflow may not have run successfully). Skipping."
            echo "skip_dry_run=true" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "Selected tenant: $tenant"
          echo "TENANT_DB=$tenant" >> "$GITHUB_ENV"

          # --no-owner / --no-privileges avoid pg_restore complaints
          # against the job-local odoo role. --no-tablespaces too —
          # tablespaces are platform-specific (agentlab uses Fly volumes).
          pg_dump --no-owner --no-privileges --no-tablespaces \
            --format=plain \
            --dbname="$tenant" \
            --file=/tmp/snapshot.sql
          echo "Snapshot size: $(wc -c < /tmp/snapshot.sql) bytes"

      - uses: docker/setup-buildx-action@v3
        if: steps.preflight.outputs.skip != 'true' && env.skip_dry_run != 'true'

      - name: docker build Odoo (for migration dry-run)
        if: steps.preflight.outputs.skip != 'true' && env.skip_dry_run != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: odoo-saas:migrate-staging
          cache-from: type=gha

      - name: Restore snapshot into job-local Postgres
        if: steps.preflight.outputs.skip != 'true' && env.skip_dry_run != 'true'
        env:
          PGPASSWORD: odoo
        run: |
          set -euo pipefail
          target=migrate_staging
          psql -h 127.0.0.1 -p 5432 -U odoo -d postgres \
            -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname='$target' AND pid <> pg_backend_pid();" 2>/dev/null || true
          psql -h 127.0.0.1 -p 5432 -U odoo -d postgres \
            -c "DROP DATABASE IF EXISTS $target;"
          psql -h 127.0.0.1 -p 5432 -U odoo -d postgres \
            -c "CREATE DATABASE $target OWNER odoo ENCODING 'UTF8';"
          # --single-transaction so a mid-restore failure rolls back
          # everything (no half-restored DB poisoning the -u all step).
          # --quiet suppresses per-statement chatter; errors still show.
          psql -h 127.0.0.1 -p 5432 -U odoo -d "$target" \
            --single-transaction --quiet \
            -f /tmp/snapshot.sql

      - name: Run odoo -u all
        if: steps.preflight.outputs.skip != 'true' && env.skip_dry_run != 'true'
        env:
          PGHOST: 127.0.0.1
          PGPORT: '5432'
          PGUSER: odoo
          PGPASSWORD: odoo
          ADMIN_PASSWORD: ci-admin-pw-not-for-prod
          PLATFORM: compose
          TARGET_DB: migrate_staging
          UPDATE_MODULES: all
          STOP_AFTER_INIT: '1'
        run: |
          docker run --rm \
            --network host \
            -e PGHOST -e PGPORT -e PGUSER -e PGPASSWORD \
            -e ADMIN_PASSWORD -e PLATFORM \
            -e TARGET_DB -e UPDATE_MODULES -e STOP_AFTER_INIT \
            odoo-saas:migrate-staging

      - name: Cleanup flyctl proxy
        if: always()
        run: |
          if [ -f /tmp/flyctl-proxy.pid ]; then
            kill "$(cat /tmp/flyctl-proxy.pid)" 2>/dev/null || true
          fi
