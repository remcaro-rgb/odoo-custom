# Scheduled pgBackRest base backups for the shared-tier Postgres on both
# Railway and Fly. WAL archiving runs continuously inside each postgres
# container (archive_command), but a base backup is required to actually
# restore — without one, the WAL alone is useless. This workflow makes sure
# we always have a recent base backup in the HOT bucket.
#
# Schedule:
#   Mon-Sat 03:00 UTC (22:00 COT)  → pgbackrest backup --type=diff
#   Sunday  04:00 UTC (23:00 COT)  → pgbackrest backup --type=full
# (Sunday's full anchors the next week; diffs reference it.)
#
# Retention is enforced by pgBackRest itself (repo1-retention-full=4,
# repo1-retention-diff=7, repo1-retention-archive=30) — see
# infra/postgres/pgbackrest.conf.
#
# Required GitHub Actions secrets:
#   RAILWAY_TOKEN              project token scoped to odoo-saas
#   RAILWAY_PROJECT_ID         465dcc94-8004-4b4c-ad19-039d1b9b90c8
#   RAILWAY_ENVIRONMENT_ID     41fa1df4-6faa-4dae-beed-644fa6354180
#   FLY_API_TOKEN              org-scoped Fly token with ssh access to
#                              odoo-saas-postgres

name: pgBackRest base backup

on:
  schedule:
    # GitHub treats `0 3 * * 1-6` and `0 4 * * 0` as separate triggers; the
    # `determine-type` job reads github.event.schedule to pick diff vs full.
    - cron: "0 3 * * 1-6"
    - cron: "0 4 * * 0"
  workflow_dispatch:
    inputs:
      backup_type:
        description: "Backup type for this run"
        type: choice
        required: true
        default: "diff"
        options: [diff, full, incr]
      target:
        description: "Which platform(s) to back up"
        type: choice
        required: true
        default: "both"
        options: [both, railway, fly]

jobs:
  determine-type:
    runs-on: ubuntu-latest
    outputs:
      type: ${{ steps.t.outputs.type }}
      target: ${{ steps.t.outputs.target }}
    steps:
      - id: t
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.backup_type }}" >> "$GITHUB_OUTPUT"
            echo "target=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 4 * * 0" ]; then
            echo "type=full" >> "$GITHUB_OUTPUT"
            echo "target=both" >> "$GITHUB_OUTPUT"
          else
            echo "type=diff" >> "$GITHUB_OUTPUT"
            echo "target=both" >> "$GITHUB_OUTPUT"
          fi

  backup-railway:
    needs: determine-type
    if: needs.determine-type.outputs.target == 'both' || needs.determine-type.outputs.target == 'railway'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Materialize Railway SSH key from secret
        # `railway ssh` (CLI v4.58+) requires a key that is BOTH present
        # locally in ~/.ssh/ AND pre-registered on the Railway account
        # (no auto-registration anymore). A persistent dedicated keypair
        # is checked in via the RAILWAY_SSH_PRIVATE_KEY secret; the
        # public half is registered once via `railway ssh keys add`
        # under the name "gh-actions-pgbackrest" — see .github/SECRETS.md.
        # We also write an ssh_config with StrictHostKeyChecking=accept-new
        # because Railway's SSH proxy host fingerprint isn't pinned and
        # the runner's known_hosts starts empty.
        env:
          RAILWAY_SSH_PRIVATE_KEY: ${{ secrets.RAILWAY_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${RAILWAY_SSH_PRIVATE_KEY:-}" ]; then
            echo "::error::RAILWAY_SSH_PRIVATE_KEY unset; see .github/SECRETS.md." >&2
            exit 1
          fi
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$RAILWAY_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          ssh-keygen -y -f "$HOME/.ssh/id_ed25519" > "$HOME/.ssh/id_ed25519.pub"
          cat > "$HOME/.ssh/config" <<'SSHCFG'
          Host *
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
          SSHCFG
          chmod 600 "$HOME/.ssh/config"
          touch "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"
      - name: pgbackrest backup (Railway)
        env:
          # Railway CLI v4.58+ no longer accepts project tokens for
          # `railway ssh` / `railway whoami` — needs an ACCOUNT-level
          # token via the RAILWAY_API_TOKEN env. The legacy project-token
          # flow via RAILWAY_TOKEN still works for `railway up` deploys
          # but fails everything else. SECRETS.md documents the split.
          RAILWAY_API_TOKEN_RAW: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
          BACKUP_TYPE: ${{ needs.determine-type.outputs.type }}
        run: |
          set -euo pipefail
          # Trim trailing \r\n (gh-secret-set interactive paste artifact).
          export RAILWAY_API_TOKEN="$(printf '%s' "$RAILWAY_API_TOKEN_RAW" | tr -d '\r\n')"
          if [ -z "${RAILWAY_API_TOKEN:-}" ]; then
            echo "::error::RAILWAY_API_TOKEN is unset; configure repo secret (see .github/SECRETS.md)." >&2
            exit 1
          fi
          # v4.58 link/ssh expects project + environment NAMES (not the
          # UUIDs the GraphQL API returns). The IDs are kept as secrets
          # for symmetry with the rest of the toolchain but aren't used
          # by the CLI here. If the project gets renamed, update these
          # two values in lockstep with the Railway dashboard.
          railway link \
            --project odoo-saas \
            --environment production \
            --service postgres
          # CRITICAL: unset RAILWAY_PROJECT_ID / RAILWAY_ENVIRONMENT_ID before
          # ssh runs. The CLI prefers env-var UUIDs over the linked-state in
          # config.json; with the UUID-form env vars set, ssh queries with
          # UUIDs and fails ("Project not found") even though the link
          # succeeded. Linked-state uses names internally.
          unset RAILWAY_PROJECT_ID RAILWAY_ENVIRONMENT_ID
          # railway ssh joins args + runs remote `sh -c`, so the SQL/CLI string
          # has to survive the remote shell's parse — see the Railway TXT-prefix
          # memory note. Plain alphanumerics + slashes are fine.
          # Also pin host-key auto-accept via -o for the underlying ssh: the
          # runner's known_hosts is empty and the proxy host fingerprint
          # changes per session, so strict checking will reject otherwise.
          railway ssh --service postgres \
            "gosu postgres pgbackrest --stanza=shared --pg1-path=/var/lib/postgresql/data/pgdata --log-level-console=info backup --type=$BACKUP_TYPE"

  backup-fly:
    needs: determine-type
    if: needs.determine-type.outputs.target == 'both' || needs.determine-type.outputs.target == 'fly'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: pgbackrest backup (Fly)
        env:
          # SSH-scoped token (created via `flyctl tokens create ssh
          # --app odoo-saas-postgres`). The plain deploy token used by the
          # deploy-fly job in ci.yml cannot execute `ssh console`'s
          # GraphQL `appcompact` query — observed as
          # "You must be authenticated to view this." 401 in the first
          # run of this workflow. SSH tokens additionally include the
          # org-wireguard scope which `flyctl ssh console` needs.
          FLY_API_TOKEN: ${{ secrets.FLY_SSH_TOKEN_POSTGRES }}
          BACKUP_TYPE: ${{ needs.determine-type.outputs.type }}
        run: |
          set -euo pipefail
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "::error::FLY_SSH_TOKEN_POSTGRES is unset; configure repo secret." >&2
            exit 1
          fi
          flyctl ssh console --app odoo-saas-postgres -C "gosu postgres pgbackrest --stanza=shared --pg1-path=/var/lib/postgresql/data/pgdata --log-level-console=info backup --type=$BACKUP_TYPE"

  report:
    needs: [backup-railway, backup-fly, determine-type]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## pgBackRest run (${{ needs.determine-type.outputs.type }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Railway | ${{ needs.backup-railway.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Fly | ${{ needs.backup-fly.result }} |" >> "$GITHUB_STEP_SUMMARY"
          # Surface failure: if either platform errored (and was selected for
          # this run), fail the report job so the user gets a red X on the
          # workflow run rather than a quietly-failed step buried in logs.
          rr="${{ needs.backup-railway.result }}"
          fr="${{ needs.backup-fly.result }}"
          if [ "$rr" = "failure" ] || [ "$fr" = "failure" ]; then
            echo "::error::At least one platform's pgBackRest run failed (railway=$rr, fly=$fr)" >&2
            exit 1
          fi
