name: protection-drift-audit

# Detects drift between the required-status-check list on `main` and the
# actual job names declared in `.github/workflows/`. Stale references to a
# renamed or deleted job silently block every PR; this catches that early.
#
# Runs on every PR that edits a workflow file, plus on push to main and a
# daily cron as a safety net for protection-config changes made via the UI.

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/workflows/protection-drift-audit.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
  schedule:
    - cron: '17 9 * * *'  # 09:17 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Protection-drift audit
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4

      - name: Collect job names from workflows
        id: jobs
        run: |
          set -euo pipefail
          # Extract every `    name: <something>` line that lives directly under a
          # job mapping (4-space indent under jobs:). This is the GHA check name.
          # PyYAML is a stable parser; avoids brittle regex.
          python3 - <<'PY' > /tmp/job-names.txt
          import pathlib, sys, yaml
          names = set()
          for p in sorted(pathlib.Path('.github/workflows').glob('*.yml')):
              try:
                  doc = yaml.safe_load(p.read_text())
              except yaml.YAMLError as e:
                  print(f"::warning file={p}::YAML parse failed: {e}", file=sys.stderr)
                  continue
              if not isinstance(doc, dict):
                  continue
              for job in (doc.get('jobs') or {}).values():
                  if isinstance(job, dict) and isinstance(job.get('name'), str):
                      names.add(job['name'])
          for n in sorted(names):
              print(n)
          PY
          echo "Workflow job names ($(wc -l </tmp/job-names.txt)):"
          cat /tmp/job-names.txt

      - name: Fetch required-check list from branch protection
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/branches/main/protection" \
            --jq '.required_status_checks.contexts[]' > /tmp/required-checks.txt || true
          echo "Required checks on main ($(wc -l </tmp/required-checks.txt)):"
          cat /tmp/required-checks.txt

      - name: Diff
        run: |
          set -euo pipefail
          missing=$(comm -23 \
            <(sort -u /tmp/required-checks.txt) \
            <(sort -u /tmp/job-names.txt))
          if [ -n "$missing" ]; then
              echo "::error::These required checks have NO matching workflow job; they will block every PR until renamed or removed:"
              while IFS= read -r name; do
                  echo "::error::  '$name'"
              done <<< "$missing"
              exit 1
          fi
          echo "::notice::All required checks have matching workflow jobs."
