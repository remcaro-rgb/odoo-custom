# odoo-saas-agents — config template.
# Copy to agents/config.yml and fill in real values for your environment.
# Per-environment overrides go in agents/config.{dev,staging,prod}.yml.
# Env vars override everything: AGENTS_BINDINGS_LLM=ollama overrides bindings.llm.

runtime:
  log_level: info
  spend_cap_monthly_usd: 250
  agents_enabled: true       # kill switch; flipping false pauses every agent

bindings:
  llm:        litellm
  repo:       github
  issues:     github
  notifier:   slack
  chat:       ""             # blank => same instance as notifier when notifier=slack
  secrets:    envvar
  artifacts:  s3
  compute:    fly
  kb:         pgvector
  events:     github_webhook
  state:      sqlite
  logger:     stdjson

# --- LLM ---
litellm:
  model: claude-sonnet-4-6
  fallback_models:
    - gpt-4o
    - gemini-2.5-pro
  api_key_secret: ANTHROPIC_API_KEY

# --- Repo + Issues ---
github:
  org: your-org
  repo: odoo-saas
  token_secret: GITHUB_TOKEN
  service_account: odoo-saas-agents-bot

# --- Notifier ---
slack:
  workspace_secret: SLACK_BOT_TOKEN
  signing_secret_name: SLACK_SIGNING_SECRET    # used by events_slack_webhook adapter
  default_channel: "#devops-agents"
  channels_per_agent:
    spec_generator:  "#devops-intake"
    implementation:  "#devops-implementations"
    code:            "#devops-agents"
    security:        "#devops-security"
    optimization:    "#devops-agents"
    support_triage:  "#support-quality"
    slack_intake:    "#devops-intake"

# --- State store (slack_intake) ---
state_sqlite:
  path: /data/slack_intake.db          # Fly volume mount; for local dev use ./tmp/state.db
  dedupe_ttl_hours: 24

# --- Compute (preview envs, agentlab) ---
fly:
  org: odoo-saas
  region_primary: iad
  preview_app_prefix: odoo-saas-preview-spec-
  preview_app_size: shared-cpu-1x
  agentlab_app: odoo-saas-odoo-agentlab

# --- Artifact store (S3-compatible) ---
s3:
  endpoint: https://<account>.r2.cloudflarestorage.com
  bucket: odoo-saas-artifacts
  region: auto
  access_key_secret: S3_ACCESS_KEY
  secret_key_secret: S3_SECRET_KEY

# --- Knowledge base ---
pgvector:
  dsn_secret: SUPPORT_GATEWAY_PG_DSN

# --- Logger ---
stdjson:
  sink: stdout                # platform log capture forwards to Better Stack

# --- Per-agent caps ---
agents:
  spec_generator:
    spend_cap_weekly_usd: 50
    max_open_prs: 3
    # PR1 intake+drafter rollout flag — when true, the agent parses the issue,
    # drafts a spec, but DOES NOT push the branch, open a PR, or comment.
    # Flip off after the shadow soak per docs/runbooks/spec-generator-rollout.md.
    shadow_mode: true
    # Slack channel for intake pings (drafted, awaiting confirm, escalated).
    notifier_channel: "#devops-intake"
    # GitHub bot identity attached to draft commits and the PR. Override the
    # commit author when wiring the spec-generator-bot GitHub App.
    bot_login: spec-generator-bot
    bot_email: spec-generator-bot@goliatt.co
  implementation:
    spend_cap_weekly_usd: 100
    spend_cap_per_pr_usd: 20
    max_open_prs: 5
    max_reporter_iterations: 5
    max_human_iterations: 3
    preview_env_cap: 10
  code:
    spend_cap_weekly_usd: 40
    max_open_prs: 3
  security:
    spend_cap_weekly_usd: 60
    max_open_prs: 3
  optimization:
    spend_cap_weekly_usd: 30
    max_open_prs: 3
  support_triage:
    spend_cap_monthly_usd: 300
    issues_per_tenant_per_day: 5
    messages_per_user_per_hour: 30
  slack_intake:
    # Phase rollout flag — when true, /intake still files GH issues but the
    # bot does NOT relay GH -> Slack. Flip off at the end of Phase B's
    # one-week soak.
    shadow_mode: true
    # Channels where /intake is allowed. Empty list = bot ignores /intake.
    # Use channel IDs (Cxxxx). "*" allows any channel.
    allowed_channels: []
    # GitHub login(s) whose issue comments get relayed back to Slack.
    relay_authors:
      - spec-generator-bot
    # Optional regex list overriding the sensitive-topic default. Matching
    # descriptions are refused and pointed at the support inbox.
    sensitive_patterns: []
    # Slack option list (max 100) populated into the addon select.
    addon_choices: []
    # Rate limits (mirrors Support Triage Agent §5.10).
    issues_per_user_per_hour: 5
    issues_per_workspace_per_hour: 30

# --- Adapter allow-list (production safety) ---
# In production config, set strict allow-list so a PR can't silently swap a vendor.
allowed_adapters:
  llm:        [litellm, claude, openai]    # not ollama in prod
  repo:       [github]
  issues:     [github]
  notifier:   [slack, email, webhook]
  chat:       [slack, ""]
  secrets:    [envvar, vault]
  artifacts:  [s3]
  compute:    [fly, railway]
  kb:         [pgvector]
  events:     [github_webhook, slack_webhook]
  state:      [sqlite]
  logger:     [stdjson]
