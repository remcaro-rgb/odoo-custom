# Production overrides for the slack_intake Fly app.
#
# Loaded automatically when AGENTS_ENV=prod (set in
# infra/fly/slack-intake/fly.toml [env] block). The values here deep-merge
# on top of config.yml — anything not specified inherits from the base.
#
# Why this file exists (rather than env-var overrides):
#   agents/config.py's _apply_env_overrides splits AGENTS_<X>_<Y>_... on
#   single underscores. That can't represent keys with their own
#   underscores like `slack_intake` and `allowed_channels`. Until config.py
#   grows a richer env-var syntax, prod-specific structured values land
#   here.

agents:
  slack_intake:
    # Phase C: bidirectional relay enabled. The bot now forwards Spec
    # Generator's comments from the GitHub issue into the originating
    # Slack thread, and syncs reporter replies back as attributed GitHub
    # comments. The "Confirm intent ✓" button posts `/confirm` on click.
    # Channel scope is still limited to the test channel below.
    shadow_mode: false
    # GitHub authors whose issue comments get relayed to Slack. Steady
    # state is just `spec-generator-bot` (once that service account exists
    # and the Spec Generator agent is deployed). For Phase C smoke
    # testing we also relay comments from the human operator so we can
    # exercise the loop without a live Spec Generator. Remove the human
    # entry before Phase D rollout to avoid noisy relays of routine
    # comments.
    relay_authors:
      - spec-generator-bot
      - remcaro-rgb
    # Channels where /intake is allowed. Phase C stays on the single test
    # channel for soak; Phase D rolls workspace-wide via ["*"].
    allowed_channels:
      - C0B6A815JN6
