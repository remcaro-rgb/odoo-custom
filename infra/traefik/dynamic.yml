# Traefik v3 dynamic configuration — fallback / baseline.
#
# Production source of truth for per-tenant routes is the Redis KV provider
# (see traefik.yml). This file ships the static baseline that is *always*
# present regardless of whether Redis is reachable:
#
#   - Middlewares used by every tenant route.
#   - IP-allowlist for /web/database/* (the Odoo master-password surface).
#   - Health endpoints exposed for platform liveness checks.

http:
  middlewares:

    # Compress responses (Odoo's HTML/JSON is highly compressible).
    saas-compress:
      compress: {}

    # Security headers applied to every tenant response.
    saas-security-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        frameDeny: false  # Odoo studio + iframes need this off

    # IP-allowlist for the Odoo master-password surface. Only the SaaS control
    # plane (Vercel egress) and the operator bastion may hit these endpoints.
    # IPs are placeholders — fill from the control-plane Vercel egress range
    # and the bastion's static IP before pilot.
    saas-database-allowlist:
      ipAllowList:
        sourceRange:
          - "127.0.0.1/32"            # local dev
          # - "76.76.21.21/32"        # Vercel egress (example)
          # - "<bastion-ip>/32"

    # Rate limit per source IP — protects shared Odoo pool from a single
    # tenant misbehaving (e.g., scripted polling).
    saas-rate-limit:
      rateLimit:
        average: 100
        burst: 200
        period: 1s

  services:

    # The shared-tier Odoo pool, reachable on each platform's internal
    # network. On Fly: `odoo-saas-odoo.internal:8069` over 6PN. On Railway:
    # `odoo.railway.internal:8069` — but Railway isn't running Traefik (it's
    # using Railway's edge directly), so the Fly form is what actually gets
    # used. If/when this dynamic.yml ships to a Railway Traefik in the
    # future, override via Redis with the Railway-internal host.
    saas-odoo-shared:
      loadBalancer:
        servers:
          - url: "http://odoo-saas-odoo.internal:8069"
        passHostHeader: true   # Odoo's dbfilter resolves the tenant DB from
                               # the original Host header, NOT a rewritten one.

  routers:

    # Hard-coded fallback router: blocks the master-password endpoints unless
    # the source IP is in the allowlist above. Tenant-specific routers come
    # from Redis and stack ON TOP of this rule when both match.
    saas-database-guard:
      rule: "PathPrefix(`/web/database`)"
      priority: 1000
      service: noop@internal
      middlewares:
        - saas-database-allowlist

    # Wildcard tenant router — matches `<slug>.app.goliatt.co` and forwards to
    # the shared Odoo pool. With `tls.certResolver: cloudflare` + an explicit
    # `tls.domains` entry, Traefik PRE-ACQUIRES the *.app.goliatt.co cert on
    # startup (rather than lazily on first request) so the first tenant hit
    # doesn't pay the ACME round-trip latency.
    #
    # `<slug>` is whatever Odoo's tenant DB is named (control plane enforces
    # the same regex). Priority below the database-guard so /web/database
    # still gates on IP first.
    saas-tenants-wildcard:
      rule: "HostRegexp(`^[a-z0-9][a-z0-9-]*\\.app\\.goliatt\\.co$`)"
      priority: 100
      service: saas-odoo-shared
      middlewares:
        - saas-compress
        - saas-security-headers
        - saas-rate-limit
      tls:
        certResolver: cloudflare
        domains:
          - main: "*.app.goliatt.co"

    # Platform liveness probe — answers 200 OK regardless of tenant state.
    saas-liveness:
      rule: "Path(`/saas/edge/health`)"
      service: noop@internal

# Empty `tcp: {}` / `udp: {}` blocks rejected by Traefik 3.2.5+ as
# "standalone element (type *dynamic.TCPConfiguration)". Omit them entirely
# until/unless real TCP/UDP routers land.
