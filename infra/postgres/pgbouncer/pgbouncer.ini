; PgBouncer configuration — transaction-pooling front for the SaaS Postgres.
;
; Database list comes from the `*` wildcard entry: any DB name a client
; connects to is forwarded to the same upstream postgres host. That matches
; Odoo's multi-tenant model (one DB per tenant slug, all on the same
; cluster).

[databases]
* = host=%(PG_HOST)s port=%(PG_PORT)s

[users]
; Per-user overrides go here when they exist. Phase 1 has just `odoo`
; (CREATEDB role) + `postgres` (superuser); both are picked up from the
; auth_file generated by entrypoint.sh.

[pgbouncer]
listen_addr = ::
listen_port = 6432

; Transaction pooling: each transaction gets a server connection from the
; pool, returns it on COMMIT. Right tradeoff for Odoo's per-request
; transactions. Statement pooling is incompatible with prepared statements
; that Odoo uses; session pooling pins a client to a server for life,
; defeating the point.
pool_mode = transaction

; Pool sizing. default_pool_size is per (user, database) pair — most traffic
; goes through the single Odoo DB so the effective pool is ~25. Bump if we
; see "no more connections allowed" client-side.
max_client_conn = 500
default_pool_size = 25
reserve_pool_size = 5
reserve_pool_timeout = 3

; Auth. SCRAM-SHA-256 against the userlist.txt the entrypoint generates
; from PGUSER + PGPASSWORD env. Connections from clients use the same
; SCRAM exchange.
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Server-side TLS (PgBouncer → upstream Postgres). On Railway/Fly the
; internal mesh is already encrypted at the transport layer, so we skip
; the cert verification and rely on the network. Enable verify-full when
; an exclusive-tier tenant runs on a separate VM.
server_tls_sslmode = prefer

; Log everything important to stderr; the container collects it.
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
admin_users = pgbouncer
stats_users = pgbouncer

; Timeouts. Quick kills for orphaned connections so the pool doesn't fill
; up with idlers when Vercel functions go cold mid-transaction.
server_idle_timeout = 60
client_idle_timeout = 0
query_timeout = 60
server_lifetime = 3600
