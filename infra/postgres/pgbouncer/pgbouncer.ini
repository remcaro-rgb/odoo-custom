; PgBouncer configuration — transaction-pooling front for the SaaS Postgres.
;
; Database list comes from the `*` wildcard entry: any DB name a client
; connects to is forwarded to the same upstream postgres host. That matches
; Odoo's multi-tenant model (one DB per tenant slug, all on the same
; cluster).

[databases]
* = host=%(PG_HOST)s port=%(PG_PORT)s

[users]
; Per-user overrides go here when they exist. Phase 1 has just `odoo`
; (CREATEDB role) + `postgres` (superuser); both are picked up from the
; auth_file generated by entrypoint.sh.

[pgbouncer]
; `*` binds both IPv4 + IPv6. Fly's 6PN traffic comes in over IPv6 so
; `::` alone would route fine, but Fly's TCP health-check prober defaults
; to IPv4 and would flap `connection refused` on `*` aware listeners.
; Dual-stack avoids the cosmetic check failure without changing behavior
; for real traffic.
listen_addr = *
listen_port = 6432

; Session pooling. Odoo uses LISTEN/NOTIFY for bus.bus longpolling +
; SAVEPOINT + temporary tables in some reports + advisory locks in cron —
; ALL of those break under transaction-pooling. Session pooling pins a
; client to a server for the client's session lifetime; throughput is
; lower than transaction-pooling but Odoo's features all work without
; coddling. Bump default_pool_size to compensate.
;
; If a future workload doesn't need LISTEN/NOTIFY (a strictly stateless
; API in front of Postgres, no longpolling), flip back to
; pool_mode = transaction + set disable_prepared_statements on the
; client side.
pool_mode = session

; Pool sizing. default_pool_size is per (user, database) pair. With
; session pooling each Odoo worker holds a backend until disconnect,
; so we size for (Odoo workers * tenants). Phase 1: 4 HTTP workers +
; 2 cron workers per Odoo pool, ~5 active tenants → ~30 connections.
; Bumped to 50 with reserve to cover bursts during /web/database/create.
max_client_conn = 500
default_pool_size = 50
reserve_pool_size = 10
reserve_pool_timeout = 3

; Auth. SCRAM-SHA-256 against the userlist.txt the entrypoint generates
; from PGUSER + PGPASSWORD env. Connections from clients use the same
; SCRAM exchange.
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Server-side TLS (PgBouncer → upstream Postgres). On Railway/Fly the
; internal mesh is already encrypted at the transport layer, so we skip
; the cert verification and rely on the network. Enable verify-full when
; an exclusive-tier tenant runs on a separate VM.
server_tls_sslmode = prefer

; Log everything important to stderr; the container collects it.
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
admin_users = pgbouncer
stats_users = pgbouncer

; Timeouts. Quick kills for orphaned connections so the pool doesn't fill
; up with idlers when Vercel functions go cold mid-transaction.
server_idle_timeout = 60
client_idle_timeout = 0
query_timeout = 60
server_lifetime = 3600
