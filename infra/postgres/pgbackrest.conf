# pgBackRest configuration — Odoo SaaS data plane
#
# Static defaults here. Secrets and platform-specific values come from
# PGBACKREST_* environment variables at runtime (set per-platform):
#
#   PGBACKREST_REPO1_S3_BUCKET     — name of the S3 bucket (HOT tier)
#   PGBACKREST_REPO1_S3_REGION     — AWS region (default us-east-1)
#   PGBACKREST_REPO1_S3_KEY        — IAM access key (prefer IAM role)
#   PGBACKREST_REPO1_S3_KEY_SECRET — IAM secret (prefer IAM role)
#   PGBACKREST_REPO1_CIPHER_PASS   — repo encryption passphrase (KMS-wrapped
#                                      tenant DEK is layered on top in the
#                                      WDK backup pipeline; this is repo-side
#                                      encryption for the WAL stream itself)
#
# The stanza name "shared" matches the shared-tier Odoo pool. Per-tenant
# exclusive-tier Postgres instances get their own stanza named after the
# tenant slug, configured on the exclusive Postgres image at provision time.

[global]
process-max          = 4
log-level-console    = info
log-level-file       = detail
compress-type        = zst
compress-level       = 3
start-fast           = y

# Repository 1 — AWS S3 (HOT WAL tier)
repo1-type           = s3
repo1-s3-endpoint    = s3.amazonaws.com
repo1-path           = /pgbackrest
repo1-cipher-type    = aes-256-cbc
# repo1-s3-bucket / repo1-s3-region / repo1-s3-key / repo1-s3-key-secret /
# repo1-cipher-pass come from PGBACKREST_REPO1_* env vars; not stored on disk.

# Retention. The HOT tier holds 30 days of WAL + the most recent base backups
# needed to restore from any point in that window. WARM dumps (separate
# pipeline, S3 Standard-IA) and COLD compliance snapshots (Glacier Deep, 10y)
# live elsewhere and are not pgBackRest's job.
repo1-retention-full       = 4
repo1-retention-diff       = 7
repo1-retention-archive    = 30
repo1-retention-archive-type = incr

[shared]
pg1-path = /var/lib/postgresql/data
pg1-port = 5432
pg1-user = postgres
