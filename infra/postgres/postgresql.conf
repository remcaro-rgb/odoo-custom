# Postgres 16 — Odoo SaaS data plane
#
# Tuned for a single-region multi-tenant Postgres serving many Odoo databases.
# Numeric tuning here assumes ~4 vCPU / 8 GB RAM as a starting baseline; raise
# proportionally for larger instances. Re-run pgbench after tuning.
#
# Live workload mix:
#   - Many small DBs (~50-500 MB each), one per tenant
#   - Read-heavy (Odoo reports, list views), with bursty writes during Odoo
#     module installs and end-of-period accounting closes
#   - Continuous WAL archiving via pgBackRest (5-min RPO contract)

# --- Connections -------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 200
# PgBouncer (separate service) sits in front for connection pooling; the 200
# cap above is the *backend* slot count, not user-facing concurrency.

# --- Memory ------------------------------------------------------------------
shared_buffers = 2GB
work_mem = 16MB
maintenance_work_mem = 256MB
effective_cache_size = 6GB

# --- WAL & archiving ---------------------------------------------------------
# Continuous WAL archiving is the foundation of the 5-min RPO SLA. See the
# Backup, Restore, and Compliance Retention section of the architecture plan.
wal_level = replica
max_wal_senders = 4
max_replication_slots = 4
wal_keep_size = 2GB

archive_mode = on
archive_command = 'pgbackrest --stanza=shared archive-push %p'
# Forces a WAL segment switch every 60s even on idle DBs. This is what turns
# "5-minute RPO" from marketing into an operationally enforced SLA.
archive_timeout = 60s

# --- Checkpoints -------------------------------------------------------------
checkpoint_timeout = 15min
max_wal_size = 4GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9

# --- Parallelism -------------------------------------------------------------
max_worker_processes = 8
max_parallel_workers = 4
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 2

# --- Query planner -----------------------------------------------------------
random_page_cost = 1.1
effective_io_concurrency = 200

# --- Logging -----------------------------------------------------------------
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 10MB
log_autovacuum_min_duration = 1000
log_line_prefix = '%t [%p] %u@%d '

# --- Autovacuum --------------------------------------------------------------
# Many small DBs → autovacuum has to keep up across all of them.
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# --- Locale / Timezone -------------------------------------------------------
timezone = 'UTC'
log_timezone = 'UTC'
datestyle = 'iso, mdy'
lc_messages = 'C'
lc_monetary = 'C'
lc_numeric = 'C'
lc_time = 'C'
default_text_search_config = 'pg_catalog.english'
